[package]
name = "expo-rust-jsi"
version = "0.1.0"
edition = "2021"
description = "Rust bindings for Expo Modules via direct JSI integration"
license = "MIT"

[lib]
name = "expo_rust_jsi"
crate-type = ["staticlib", "lib"]

[features]
default = ["example_modules"]
example_modules = []

[dependencies]
# In production: resolved from crates.io.
# For local dev / monorepo: the platform build scripts (Gradle, CocoaPods)
# generate .cargo/config.toml with [patch.crates-io] pointing to the
# npm-resolved path of expo-rust-jsi-core. This works with all package
# managers (npm, yarn, pnpm, bun) regardless of node_modules layout.
expo-rust-jsi-core = "0.1"

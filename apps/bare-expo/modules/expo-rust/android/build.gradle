plugins {
  id 'com.android.library'
  id 'org.jetbrains.kotlin.android'
  id 'expo-module-gradle-plugin'
}

expoModule {
  canBePublished false
}

android {
  namespace "expo.modules.rust"

  buildFeatures {
    prefab true
  }

  defaultConfig {
    externalNativeBuild {
      cmake {
        cppFlags "-std=c++20", "-fexceptions"
        arguments "-DANDROID_STL=c++_shared"
      }
    }

    ndk {
      abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
    }
  }

  externalNativeBuild {
    cmake {
      path file('CMakeLists.txt')
    }
  }
}

dependencies {
  implementation 'com.facebook.react:react-android'
  implementation 'com.facebook.fbjni:fbjni'
}

// Map Android ABI to Rust target triple
def abiToRustTarget = [
  'armeabi-v7a': 'armv7-linux-androideabi',
  'arm64-v8a'  : 'aarch64-linux-android',
  'x86'        : 'i686-linux-android',
  'x86_64'     : 'x86_64-linux-android'
]

// Task to build the Rust library for all target architectures
android.defaultConfig.ndk.abiFilters.each { abi ->
  def rustTarget = abiToRustTarget[abi]
  if (rustTarget == null) return

  def taskName = "cargoBuild${abi.replace('-', '_').capitalize()}"

  tasks.register(taskName, Exec) {
    description = "Build Rust library for $abi ($rustTarget)"
    workingDir = file("${project.projectDir}/..")

    commandLine(
      'cargo', 'build',
      '--release',
      '--target', rustTarget,
      '--lib'
    )
    def reactNativeDir = file("${project.projectDir}/../../react-native")
    environment 'JSI_INCLUDE_PATH', "${reactNativeDir}/ReactCommon/jsi"

    doLast {
      def src = file("${project.projectDir}/../target/$rustTarget/release/libexpo_rust.a")
      def dst = file("${project.projectDir}/../target/$abi/libexpo_rust.a")
      dst.parentFile.mkdirs()
      ant.copy(file: src, tofile: dst, overwrite: true)
    }
  }
}

// Ensure Rust is built before CMake
tasks.matching { it.name.startsWith('externalNativeBuild') }.configureEach {
  android.defaultConfig.ndk.abiFilters.each { abi ->
    def taskName = "cargoBuild${abi.replace('-', '_').capitalize()}"
    dependsOn(taskName)
  }
}
